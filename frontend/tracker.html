<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Tracker Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .video-container {
            text-align: center;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through if needed */
        }

        .stats {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px 0;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        #canvas {
            display: none;
        }

        .alert {
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
        }

        .alert.active {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 Student Focus Tracker</h1>

        <div class="grid">
            <div>
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="overlayCanvas"></canvas>
                </div>
                <canvas id="canvas"></canvas>
                <div style="text-align: center; margin-top: 10px;">
                    <button class="btn btn-primary" id="startBtn">Start Webcam</button>
                    <button class="btn btn-danger" id="stopBtn" disabled>Stop Tracking</button>
                </div>
            </div>

            <div class="stats">
                <h3>Real-Time Metrics</h3>
                <p><strong>Engagement Status:</strong> <span id="statusLabel">Off</span></p>
                <p><strong>Arousal (Energy):</strong> <span id="arousalVal">0.00</span></p>
                <p><strong>Valence (Positivity):</strong> <span id="valenceVal">0.00</span></p>

                <div id="alertBox" class="alert">
                    ⚠️ Low Engagement Detected! Please refocus.
                </div>
            </div>
        </div>
    </div>

    <script src="tracker.js"></script>
</body>

</html>
